<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Priority Message</title>  
    <style>  
        :root { --primary: #fff; --accent: #ff2d55; }  
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }  
          
        body {  
            background: #000;  
            color: var(--primary);  
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;  
            height: 100vh;  
            margin: 0;  
            display: flex;  
            align-items: center;  
            justify-content: center;  
            overflow: hidden;  
        }  
  
        #ui-card {  
            background: rgba(255, 255, 255, 0.05);  
            backdrop-filter: blur(25px);  
            -webkit-backdrop-filter: blur(25px);  
            border: 1px solid rgba(255, 255, 255, 0.1);  
            padding: 30px 20px;  
            border-radius: 28px;  
            width: 88%;  
            max-width: 360px;  
            text-align: center;  
            z-index: 5;  
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);  
        }  
  
        /* The Sticker/Image Styling */  
        .sticker {  
            width: 120px;  
            height: 120px;  
            object-fit: contain;  
            margin-bottom: 20px;  
            animation: float 3s ease-in-out infinite;  
            filter: drop-shadow(0 5px 15px rgba(255,255,255,0.2));  
        }  
  
        @keyframes float {  
            0% { transform: translateY(0px); }  
            50% { transform: translateY(-10px); }  
            100% { transform: translateY(0px); }  
        }  
  
        h1 { font-size: 1.1rem; font-weight: 300; letter-spacing: 0.5px; margin-bottom: 30px; line-height: 1.4; opacity: 0.9; }  
          
        .btn-container { display: flex; flex-direction: column; gap: 12px; align-items: center; }  
  
        button {  
            width: 100%;  
            padding: 16px;  
            border-radius: 16px;  
            border: none;  
            font-size: 1rem;  
            font-weight: 600;  
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);  
        }  
  
        #yesBtn { background: var(--primary); color: #000; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }  
        #noBtn { background: transparent; color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.1); }  
  
        #loader { display: none; font-family: monospace; font-size: 0.8rem; color: var(--accent); letter-spacing: 1px; }  
        #reveal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; opacity: 0; transition: opacity 1.2s ease; pointer-events: none; }  
        #reveal.active { opacity: 1; pointer-events: all; }  
        video { width: 100%; height: 100%; object-fit: cover; }  
    </style>  
</head>  
<body>  
  
    <div id="ui-card">  
        <div id="content">  
            <!-- PASTE YOUR IMAGE LINK BELOW -->  
            <img src="your-image-link-here.png" alt="Sticker" class="sticker">  
              
            <h1>A special delivery for you.<br>Would you like to open it?</h1>  
            <div class="btn-container">  
                <button id="yesBtn" onclick="initiate()">Open Gift</button>  
                <button id="noBtn" onmouseover="handleNo()" onclick="handleNo()">Not Now</button>  
            </div>  
        </div>  
          
        <div id="loader">  
            <p id="status">> DECRYPTING DATA...</p>  
            <p id="percent">0%</p>  
        </div>  
    </div>  
  
    <div id="reveal">  
        <video id="vid" playsinline preload="auto">  
            <source src="may13.mp4" type="video/mp4">  
        </video>  
        <audio id="mus" src="maintera.mp3" preload="auto"></audio>  
    </div>  
  
    <script>  
        let noClicks = 0;  
          
        function handleNo() {  
            noClicks++;  
            const noBtn = document.getElementById('noBtn');  
            const yesBtn = document.getElementById('yesBtn');  
            const h1 = document.querySelector('h1');  
  
            if(noClicks === 1) {  
                noBtn.style.transform = 'translateX(100px)';  
                h1.innerHTML = "System Error: <br>Option unavailable. Try again?";  
            } else {  
                noBtn.style.display = 'none';  
                h1.innerHTML = "Only one choice remains.<br>Initialize sequence?";  
                yesBtn.style.background = '#ff2d55';  
                yesBtn.style.color = '#fff';  
                yesBtn.innerHTML = "Initialize Access";  
            }  
        }  
  
        function initiate() {  
            document.getElementById('content').style.opacity = '0';  
            setTimeout(() => {  
                document.getElementById('content').style.display = 'none';  
                document.getElementById('loader').style.display = 'block';  
                startLoading();  
            }, 400);  
        }  
  
        function startLoading() {  
            let p = 0;  
            const pText = document.getElementById('percent');  
            const interval = setInterval(() => {  
                p += Math.floor(Math.random() * 20) + 2;  
                if (p >= 100) {  
                    p = 100;  
                    clearInterval(interval);  
                    setTimeout(finalReveal, 600);  
                }  
                pText.innerHTML = p + "%";  
            }, 120);  
        }  
  
        function finalReveal() {  
            const reveal = document.getElementById('reveal');  
            const v = document.getElementById('vid');  
            const m = document.getElementById('mus');  
              
            reveal.classList.add('active');  
            v.play();  
            m.play();  
        }  
    </script>  
</body>  
</html>
