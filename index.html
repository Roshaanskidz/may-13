<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A little surprise for you ✨</title>
    <style>
        :root {
            --soft-pink: #fce4ec;
            --deep-pink: #ff85a1;
            --text-color: #d81b60;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Comfortaa', cursive, sans-serif; }

        body {
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .heart {
            position: absolute; color: var(--deep-pink); opacity: 0.3;
            animation: floatUp var(--d) linear infinite; z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        #card {
            position: relative; z-index: 10;
            width: 85%; max-width: 340px;
            padding: 35px 20px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 133, 161, 0.15);
            border: 2px solid white;
        }

        .sticker { width: 120px; height: 120px; margin-bottom: 20px; animation: bounce 3s ease-in-out infinite; border-radius: 15px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        h1 { color: var(--text-color); font-size: 1.2rem; margin-bottom: 25px; line-height: 1.4; }

        .btn-stack { display: flex; flex-direction: column; gap: 12px; }

        button {
            padding: 16px; border-radius: 20px; border: none;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #yesBtn { background: var(--deep-pink); color: white; }
        #noBtn { background: #fff1f6; color: var(--deep-pink); border: 1px solid #ffdae9; }

        #reveal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 100; opacity: 0;
            transition: opacity 1s ease; pointer-events: none;
        }
        #reveal.active { opacity: 1; pointer-events: all; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="heart-wrap"></div>

    <div id="card">
        <div id="content">
            <!-- Using your specific image filename here -->
            <img src="IMG_1579.jpeg" class="sticker" alt="Sticker">
            <h1>I have a little gift for you...<br>Do you want to see it? ✨</h1>
            <div class="btn-stack">
                <button id="yesBtn" onclick="startReveal()">Yes, please! 💗</button>
                <button id="noBtn" onmouseover="runAway()" onclick="runAway()">Maybe later</button>
            </div>
        </div>
    </div>

    <div id="reveal">
        <video id="vid" playsinline>
            <!-- Using your specific video filename here -->
            <source src="copy_2F1368E7-0D0E-47CD-843D-7F984CF24471.mov" type="video/quicktime">
            <source src="copy_2F1368E7-0D0E-47CD-843D-7F984CF24471.mov" type="video/mp4">
        </video>
    </div>

    <script>
        const wrap = document.getElementById('heart-wrap');
        const heartIcons = ['🌸', '✨', '💖', '☁️'];
        for(let i=0; i<15; i++) {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = heartIcons[Math.floor(Math.random() * heartIcons.length)];
            h.style.left = Math.random() * 100 + '%';
            h.style.fontSize = Math.random() * 20 + 10 + 'px';
            h.style.setProperty('--d', Math.random() * 5 + 5 + 's');
            wrap.appendChild(h);
        }

        function runAway() {
            const noBtn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function startReveal() {
            document.getElementById('card').style.opacity = '0';
            setTimeout(() => {
                const reveal = document.getElementById('reveal');
                const vid = document.getElementById('vid');
                reveal.classList.add('active');
                vid.play();
            }, 500);
        }
    </script>
</body>
</html>
